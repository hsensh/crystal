name: build-desktop

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            sep: ":"
            artifact: DialogueCleaner-macos
          - os: windows-latest
            sep: ";"
            artifact: DialogueCleaner-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps (light only — torch/DFN install on first run)
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn python-multipart numpy scipy soundfile noisereduce pywebview pyinstaller

      - name: Build app
        run: >
          pyinstaller --noconfirm --windowed --name DialogueCleaner
          --add-data "frontend${{ matrix.sep }}frontend"
          --add-data "models${{ matrix.sep }}models"
          --collect-all webview
          --hidden-import server
          --hidden-import fusion
          --hidden-import processing
          desktop.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
