name: build-desktop

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # needed to publish releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            sep: ":"
            binext: ""
            icon: icons/crystal.icns
            zip: Crystal-macos.zip
          - os: windows-latest
            sep: ";"
            binext: ".exe"
            icon: icons/crystal.ico
            zip: Crystal-windows.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps (light only — torch/DFN install on first run)
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn python-multipart numpy scipy soundfile noisereduce pywebview pyinstaller

      - name: Fetch ffmpeg + uv (bundled binaries)
        shell: bash
        run: |
          mkdir -p bin
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install ffmpeg uv
            cp "$(which ffmpeg)" bin/ffmpeg
            cp "$(which uv)" bin/uv
          else
            choco install ffmpeg -y --no-progress
            cp "$(which ffmpeg)" bin/ffmpeg.exe
            curl -L -o uv.zip https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip
            7z e uv.zip -obin uv.exe -y
          fi

      - name: Build app
        shell: bash
        run: >
          pyinstaller --noconfirm --windowed --name Crystal
          --icon "${{ matrix.icon }}"
          --add-data "frontend${{ matrix.sep }}frontend"
          --add-data "models${{ matrix.sep }}models"
          --add-binary "bin/ffmpeg${{ matrix.binext }}${{ matrix.sep }}."
          --add-binary "bin/uv${{ matrix.binext }}${{ matrix.sep }}."
          --collect-all webview
          --hidden-import server
          --hidden-import fusion
          --hidden-import processing
          --hidden-import resources
          desktop.py

      - name: Package
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            ditto -c -k --keepParent "Crystal.app" "../${{ matrix.zip }}"
          else
            7z a "../${{ matrix.zip }}" "Crystal"
          fi

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: ${{ matrix.zip }}
